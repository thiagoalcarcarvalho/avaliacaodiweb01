    <br>
    <form method="post">
        <h1>ENTRE EM CONTATO CONOSCO E COMPARTILHE A SUA RECEITA</h1>
        <fieldset>
            <legend>Informações Pessoais</legend>
        <label for="nome">nome</label>        
        <input type="text" nome="nome" id="nome" 
        required placeholder="seu nome">
        <br>
        <label for="email">email</label>        
        <input type="email" nome="email" id="email" 
        required placeholder="seu@email.com">
        </fieldset> 
        <br>
        <fieldset>
            <legend>Endereço de entregas</legend>
        <label for="endereco">endereço</label>        
        <input type="text" nome="endereco" id="endereco" 
        required placeholder="seu endereço">        
        <br>
        <label for="bairro">bairro</label>        
        <input type="text" nome="bairro" id="bairro" 
        required placeholder="seu bairro">
        <br>
        <label for="cidade">cidade</label>        
        <input type="text" nome="cidade" id="cidade" 
        required placeholder="sua cidade">
        <br>
        
        <br>
        <select name="estado" id="estado" required>
            <option value="">Selecione o ESTADO</option>
            <option value="sp">São Paulo</option>
            <option value="rj">Rio de Janeiro</option>
            <option value="mg">Minas Gerais</option>
            <option value="DF">Distrito Federal</option>
        </select>
        <br>
        <label for="cep">cep</label>       
        <input type="text" nome="cep" id="cep" 
        required placeholder="00000-000">
        <br>
        <br>
        <label for="digite-sua-receita"></label>
        <textarea name="receita" id="digite-sua-receita" required 
         placeholder="Escreva aqui a sua receita" rows="10" cols="50"></textarea>        
         </fieldset>
        <input type="submit" value="enviar" class="button">
        <input type="reset" value="limpar" class="button">
    </form>
